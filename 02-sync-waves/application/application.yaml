apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-labs
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/devanshpoplii/argocd-labs
    targetRevision: HEAD
    path: 02-sync-waves/app
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      selfHeal: true
      prune: true

