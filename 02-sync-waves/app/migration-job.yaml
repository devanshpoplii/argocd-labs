apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      containers:
        - name: migration
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Starting migration..."
              sleep 30
              echo "Migration complete."
      restartPolicy: Never
  backoffLimit: 1

